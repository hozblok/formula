name: Test on Ubuntu (x64)

on: [pull_request]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test on python ${{ matrix.python }} ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-latest]
        architecture: [x64]
        python: ["3.9", "3.10", "3.11", "3.12", "pypy-3.9", "pypy-3.10"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          architecture: ${{ matrix.architecture }}
          cache: "pip"
          cache-dependency-path: |
            setup.py
            pyproject.toml
      - name: Configure PyPy linker (Linux)
        # PyPy's sysconfig on Linux does not populate LDSHARED/LDCXXSHARED, so
        # setuptools >= 70 ends up with linker_so_cxx == None and crashes at
        # link time with `'NoneType' object is not subscriptable`. Set both
        # vars explicitly for PyPy only — CPython uses its sysconfig values.
        if: startsWith(matrix.python, 'pypy')
        run: |
          echo "LDSHARED=g++ -shared" >> "$GITHUB_ENV"
          echo "LDCXXSHARED=g++ -shared" >> "$GITHUB_ENV"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade setuptools wheel
          python -m pip install .[test]
      - name: Test
        run: |
          python -m pytest -q
