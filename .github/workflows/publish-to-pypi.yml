name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version_bump:
        description: Version bump to apply before build
        type: choice
        options: [patch, minor, major, none]
        default: patch
      dry_run:
        description: Skip upload to PyPI (build + twine check only)
        type: boolean
        default: false

permissions:
  contents: read

# Releases must not be cancelled mid-upload — partial uploads leave PyPI in a
# half-published state.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  bump_version:
    name: Bump version (workflow_dispatch only)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.version_bump != 'none'
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
    steps:
      - uses: actions/checkout@v4
      - name: Bump version in src/formula/__init__.py
        id: bump
        env:
          VERSION_BUMP: ${{ inputs.version_bump }}
        run: |
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          bump = os.environ["VERSION_BUMP"]
          path = Path("src/formula/__init__.py")
          text = path.read_text()

          match = re.search(r'__version__\s*=\s*"(\d+)\.(\d+)\.(\d+)"', text)
          if not match:
              raise SystemExit("Unable to find __version__ in src/formula/__init__.py")

          major, minor, patch = map(int, match.groups())
          if bump == "major":
              major, minor, patch = major + 1, 0, 0
          elif bump == "minor":
              minor, patch = minor + 1, 0
          elif bump == "patch":
              patch += 1
          else:
              raise SystemExit(f"Unsupported bump: {bump}")

          new_version = f"{major}.{minor}.{patch}"
          updated = re.sub(
              r'__version__\s*=\s*"\d+\.\d+\.\d+"',
              f'__version__ = "{new_version}"',
              text,
          )
          path.write_text(updated)
          print(f"Bumped version to {new_version}")
          with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
              fh.write(f"new_version={new_version}\n")
          PY
      - name: Upload bumped source
        uses: actions/upload-artifact@v4
        with:
          name: bumped-source
          path: src/formula/__init__.py
          retention-days: 1

  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    needs: [bump_version]
    if: |
      always() &&
      (needs.bump_version.result == 'success' || needs.bump_version.result == 'skipped')
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-13, macos-14, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Restore bumped __init__.py
        if: needs.bump_version.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: bumped-source
          path: src/formula/
      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21.3
      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl
          retention-days: 7

  build_sdist:
    name: Build source distribution
    needs: [bump_version]
    if: |
      always() &&
      (needs.bump_version.result == 'success' || needs.bump_version.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Restore bumped __init__.py
        if: needs.bump_version.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: bumped-source
          path: src/formula/
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            setup.py
            pyproject.toml
      - name: Install build tooling
        run: python -m pip install --upgrade pip build
      - name: Build sdist
        run: python -m build --sdist
      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
          retention-days: 7

  upload_pypi:
    name: Upload to PyPI
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install twine
        run: python -m pip install --upgrade pip twine
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-staging
      - name: Collect distributions
        run: |
          mkdir -p dist
          find dist-staging -type f \( -name '*.whl' -o -name '*.tar.gz' \) -exec cp {} dist/ \;
          ls -la dist
      - name: Verify distributions
        run: python -m twine check --strict dist/*
      - name: Publish to PyPI
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.dry_run) }}
        env:
          TWINE_USERNAME: ${{ secrets.PYPI_USERNAME }}
          TWINE_PASSWORD: ${{ secrets.PYPI_PASSWORD }}
        run: python -m twine upload --non-interactive --skip-existing dist/*
      - name: Dry-run notice
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run
        run: |
          echo "Dry run enabled: skipping upload."
