name: Publish to PyPI

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: Version bump to apply before build
        type: choice
        options: [patch, minor, major, none]
        default: patch
      dry_run:
        description: Skip PyPI upload; create the GitHub release as a draft
        type: boolean
        default: false

permissions:
  contents: read

# Releases must not be cancelled mid-upload — partial uploads leave PyPI in a
# half-published state.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  bump_version:
    name: Bump version
    runs-on: ubuntu-latest
    if: inputs.version_bump != 'none'
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
    steps:
      - uses: actions/checkout@v4
      - name: Bump version in src/formula/__init__.py
        id: bump
        env:
          VERSION_BUMP: ${{ inputs.version_bump }}
        run: |
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          bump = os.environ["VERSION_BUMP"]
          path = Path("src/formula/__init__.py")
          text = path.read_text()

          match = re.search(r'__version__\s*=\s*"(\d+)\.(\d+)\.(\d+)"', text)
          if not match:
              raise SystemExit("Unable to find __version__ in src/formula/__init__.py")

          major, minor, patch = map(int, match.groups())
          if bump == "major":
              major, minor, patch = major + 1, 0, 0
          elif bump == "minor":
              minor, patch = minor + 1, 0
          elif bump == "patch":
              patch += 1
          else:
              raise SystemExit(f"Unsupported bump: {bump}")

          new_version = f"{major}.{minor}.{patch}"
          updated = re.sub(
              r'__version__\s*=\s*"\d+\.\d+\.\d+"',
              f'__version__ = "{new_version}"',
              text,
          )
          path.write_text(updated)
          print(f"Bumped version to {new_version}")
          with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
              fh.write(f"new_version={new_version}\n")
          PY
      - name: Upload bumped source
        uses: actions/upload-artifact@v4
        with:
          name: bumped-source
          path: src/formula/__init__.py
          retention-days: 1

  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    needs: [bump_version]
    if: |
      always() &&
      (needs.bump_version.result == 'success' || needs.bump_version.result == 'skipped')
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-13, macos-14, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Restore bumped __init__.py
        if: needs.bump_version.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: bumped-source
          path: src/formula/
      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21.3
      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl
          retention-days: 7

  build_sdist:
    name: Build source distribution
    needs: [bump_version]
    if: |
      always() &&
      (needs.bump_version.result == 'success' || needs.bump_version.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Restore bumped __init__.py
        if: needs.bump_version.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: bumped-source
          path: src/formula/
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            setup.py
            pyproject.toml
      - name: Install build tooling
        run: python -m pip install --upgrade pip build
      - name: Build sdist
        run: python -m build --sdist
      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
          retention-days: 7

  upload_pypi:
    name: Upload to PyPI
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install twine
        run: python -m pip install --upgrade pip twine
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-staging
      - name: Collect distributions
        run: |
          mkdir -p dist
          find dist-staging -type f \( -name '*.whl' -o -name '*.tar.gz' \) -exec cp {} dist/ \;
          ls -la dist
      - name: Verify distributions
        run: python -m twine check --strict dist/*
      - name: Publish to PyPI
        if: ${{ !inputs.dry_run }}
        env:
          TWINE_USERNAME: ${{ secrets.PYPI_USERNAME }}
          TWINE_PASSWORD: ${{ secrets.PYPI_PASSWORD }}
        run: python -m twine upload --non-interactive --skip-existing dist/*
      - name: Dry-run notice
        if: ${{ inputs.dry_run }}
        run: |
          echo "Dry run enabled: skipping PyPI upload."

  # Commit the version bump back to the branch, tag the commit, and create a
  # GitHub release with auto-generated notes + the wheels and sdist attached.
  # In dry-run mode, the commit and tag push are skipped and the GitHub
  # release is created as a *draft* (pinned to the workflow's commit SHA)
  # so the user can preview the assets and notes without publishing.
  #
  # GitHub releases created with GITHUB_TOKEN do not re-trigger workflows
  # (intentional GitHub design), so this won't loop back into the publish
  # workflow.
  create_release:
    name: Tag and create GitHub release
    needs: [bump_version, upload_pypi]
    if: |
      needs.bump_version.result == 'success' &&
      needs.upload_pypi.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          # Use the GITHUB_TOKEN to push the bump commit and tag back. If the
          # target branch has branch protection requiring reviews, this push
          # will fail; in that case allow the workflow's bot to bypass
          # protection or switch to a PAT with the appropriate permissions.
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Restore bumped __init__.py
        uses: actions/download-artifact@v4
        with:
          name: bumped-source
          path: src/formula/
      - name: Configure git for github-actions bot
        if: ${{ !inputs.dry_run }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Commit and push version bump
        if: ${{ !inputs.dry_run }}
        env:
          NEW_VERSION: ${{ needs.bump_version.outputs.new_version }}
        run: |
          git add src/formula/__init__.py
          git commit -m "chore: release v${NEW_VERSION}"
          git push
      - name: Create and push tag
        if: ${{ !inputs.dry_run }}
        env:
          NEW_VERSION: ${{ needs.bump_version.outputs.new_version }}
        run: |
          git tag -a "v${NEW_VERSION}" -m "Release v${NEW_VERSION}"
          git push origin "v${NEW_VERSION}"
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-staging
      - name: Collect distribution files
        run: |
          mkdir -p dist
          find dist-staging -type f \( -name '*.whl' -o -name '*.tar.gz' \) -exec cp {} dist/ \;
          ls -la dist
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_VERSION: ${{ needs.bump_version.outputs.new_version }}
          DRY_RUN: ${{ inputs.dry_run }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          args=(
            "v${NEW_VERSION}"
            --title "v${NEW_VERSION}"
            --generate-notes
          )
          if [[ "$DRY_RUN" == "true" ]]; then
            # No tag was pushed in dry-run; pin the draft to the workflow's
            # source commit so `gh` doesn't try to resolve a non-existent tag.
            args+=( --draft --target "$COMMIT_SHA" )
            echo "Dry run: creating draft release v${NEW_VERSION}."
          fi
          gh release create "${args[@]}" dist/*
