name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version_bump:
        description: Version bump to apply before build
        type: choice
        options: [patch, minor, major, none]
        default: patch
      dry_run:
        description: Skip upload to PyPI (build + twine check only)
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Publish (${{ matrix.python-version }} ${{ matrix.os }} ${{ matrix.architecture }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "pypy-3.8", "pypy-3.9"]
        os: [windows-latest, macos-latest, ubuntu-latest]
        architecture: [x64]
        include:
          - python-version: "3.6"
            os: ubuntu-20.04
            architecture: x64
          - python-version: "3.7"
            os: ubuntu-20.04
            architecture: x64
          - python-version: "3.8"
            os: macos-11
            architecture: x64
          - python-version: "3.9"
            os: macos-11
            architecture: x64
          - python-version: "3.10"
            os: macos-11
            architecture: x64
          - python-version: "3.11"
            os: macos-11
            architecture: x64
          - python-version: "3.6"
            os: windows-2019
            architecture: x64
          - python-version: "3.7"
            os: windows-2019
            architecture: x64
          - python-version: "3.6"
            os: macos-11
            architecture: x64
          - python-version: "3.7"
            os: macos-11
            architecture: x64
          - python-version: "3.8"
            os: windows-latest
            architecture: x86
          - python-version: "3.9"
            os: windows-latest
            architecture: x86
          - python-version: "3.10"
            os: windows-latest
            architecture: x86
          - python-version: "3.11"
            os: windows-latest
            architecture: x86
        exclude:
          - python-version: "3.8"
            os: macos-latest
            architecture: x64
          - python-version: "3.9"
            os: macos-latest
            architecture: x64
          - python-version: "3.10"
            os: macos-latest
            architecture: x64
          - python-version: "3.11"
            os: macos-latest
            architecture: x64
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          architecture: ${{ matrix.architecture }}
          cache: "pip"
          cache-dependency-path: |
            setup.py
            pyproject.toml
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade setuptools wheel twine build
      - name: Bump version
        if: github.event_name == 'workflow_dispatch' && inputs.version_bump != 'none'
        env:
          VERSION_BUMP: ${{ inputs.version_bump }}
        run: |
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          bump = os.environ["VERSION_BUMP"]
          path = Path("setup.py")
          text = path.read_text()

          match = re.search(r'__version__\s*=\s*"(\d+)\.(\d+)\.(\d+)"', text)
          if not match:
            raise SystemExit("Unable to find __version__ in setup.py")

          major, minor, patch = map(int, match.groups())
          if bump == "major":
            major += 1
            minor = 0
            patch = 0
          elif bump == "minor":
            minor += 1
            patch = 0
          elif bump == "patch":
            patch += 1
          else:
            raise SystemExit(f"Unsupported bump: {bump}")

          new_version = f"{major}.{minor}.{patch}"
          updated = re.sub(
              r'__version__\s*=\s*"\d+\.\d+\.\d+"',
              f'__version__ = "{new_version}"',
              text,
          )
          path.write_text(updated)
          print(f"Bumped version to {new_version}")
          PY
      - name: Build and publish
        env:
          TWINE_USERNAME: ${{ secrets.PYPI_USERNAME }}
          TWINE_PASSWORD: ${{ secrets.PYPI_PASSWORD }}
          DRY_RUN: ${{ (github.event_name == 'workflow_dispatch' && inputs.dry_run) || 'false' }}
# https://blog.ganssle.io/articles/2021/10/setup-py-deprecated.html
# https://pypa-build.readthedocs.io/en/stable/#build
        run: |
          python -m build --sdist --wheel
          python -m twine check --strict dist/*
          if [ "$DRY_RUN" = "true" ]; then
            echo "Dry run enabled: skipping upload."
          else
            python -m twine upload --non-interactive --skip-existing dist/*
          fi
