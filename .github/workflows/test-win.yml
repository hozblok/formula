name: Test on Windows (x86-x64)

# Opt-in only: tests run on a PR when the `run-tests` label is applied (and
# re-run on subsequent pushes while the label stays on), or via manual
# workflow_dispatch. Remove the label to stop further runs on the PR.
on:
  pull_request:
    types: [labeled, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test on python ${{ matrix.python }} ${{ matrix.os }} (${{ matrix.architecture }})
    if: >-
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.pull_request.labels.*.name, 'run-tests')
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest]
        architecture: [x86, x64]
        python: ["3.9", "3.12", "pypy-3.9", "pypy-3.11"]
        exclude:
          - python: "pypy-3.9"
            architecture: x86
          - python: "pypy-3.11"
            architecture: x86
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          architecture: ${{ matrix.architecture }}
          cache: "pip"
          cache-dependency-path: |
            setup.py
            pyproject.toml
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade setuptools wheel
          python -m pip install .[test]
      - name: Test
        run: |
          python -m pytest -q
