name: Test on macOS

on: [pull_request]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  MACOSX_DEPLOYMENT_TARGET: "10.15"

jobs:
  test:
    name: Test on python ${{ matrix.python }} ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        # macos-13 = x86_64, macos-14 = arm64 (Apple Silicon).
        os: [macos-13, macos-14]
        python: ["3.9", "3.10", "3.11", "3.12", "pypy-3.9", "pypy-3.10"]
        exclude:
          # PyPy does not ship arm64 macOS builds (as of late 2025); skip
          # rather than let setup-python fail to find a distribution.
          - os: macos-14
            python: pypy-3.9
          - os: macos-14
            python: pypy-3.10
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: "pip"
          cache-dependency-path: |
            setup.py
            pyproject.toml
      - name: Configure PyPy linker (macOS)
        # Same setuptools 70+ issue as Linux: PyPy's sysconfig does not
        # populate LDSHARED/LDCXXSHARED, so the C++ link step crashes with
        # `'NoneType' object is not subscriptable`. macOS extensions are
        # built as bundles with weak undefined symbols.
        if: startsWith(matrix.python, 'pypy')
        run: |
          echo "LDSHARED=clang++ -bundle -undefined dynamic_lookup" >> "$GITHUB_ENV"
          echo "LDCXXSHARED=clang++ -bundle -undefined dynamic_lookup" >> "$GITHUB_ENV"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade setuptools wheel
          python -m pip install .[test]
      - name: Test
        run: |
          python -m pytest -q
